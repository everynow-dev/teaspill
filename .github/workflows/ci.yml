name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Core workspace on the repo's minimum Node. Excludes @teaspill/docs from
  # typecheck: the docs site uses Nuxt Content's native sqlite connector
  # (node:sqlite), which needs Node >= 22.5 — it gets its own job below.
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # eslint (root) already ignores packages/docs; the docs package self-lints
      # in its own job.
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r --filter '!@teaspill/docs' run typecheck

      - name: Test
        run: pnpm test

  # Docs site on Node 22 (native node:sqlite). Lints, typechecks, and prerenders
  # the static output — a docs site that doesn't build is not done.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @teaspill/docs lint

      - name: Typecheck
        run: pnpm --filter @teaspill/docs typecheck

      - name: Generate (static prerender)
        run: pnpm --filter @teaspill/docs generate
        env:
          NUXT_PUBLIC_SITE_URL: https://teaspill.everynow.dev
